<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interrail Planner | Travel Girls Corner</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Overpass:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#BC0C0C;--red-d:#8f0909;--red-m:rgba(188,12,12,.07);--red-g:rgba(188,12,12,.16);
  --cr:#faf8f4;--cr2:#f3ede3;--cr3:#e9e0d2;--cr4:#ddd3c2;
  --ink:#1c1209;--ink2:#4a3a28;--ink3:#8a7a68;--ink4:#b5a898;--wh:#fff;
}
body{font-family:'Overpass',sans-serif;background:var(--cr);color:var(--ink);min-height:100vh}
.lora{font-family:'Lora',Georgia,serif}
h1,h2,h3,.serif{font-family:'Lora',Georgia,serif}
input,textarea,select{
  font-family:'Overpass',sans-serif;font-size:13px;
  background:var(--wh);border:1px solid var(--cr3);
  color:var(--ink);padding:9px 12px;outline:none;width:100%;
  transition:border-color .15s,box-shadow .15s;border-radius:2px;
}
input:focus,textarea:focus,select:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-m)}
input::placeholder,textarea::placeholder{color:#c8bfb0}
select option{background:#fff}
textarea{resize:vertical;min-height:80px;line-height:1.5}
input[type=checkbox]{width:auto;accent-color:var(--red);cursor:pointer;width:15px;height:15px}
.btn{font-family:'Overpass',sans-serif;cursor:pointer;border:none;font-weight:700;border-radius:2px;transition:all .15s;display:inline-block;text-align:center}
.btn-red{background:var(--red);color:#fff;padding:10px 22px;font-size:13px}
.btn-red:hover{background:var(--red-d);box-shadow:0 3px 12px var(--red-g);transform:translateY(-1px)}
.btn-out{background:transparent;color:var(--red);border:1.5px solid var(--red);padding:9px 20px;font-size:13px}
.btn-out:hover{background:var(--red-m)}
.btn-gh{background:transparent;color:var(--ink2);border:1px solid var(--cr3);padding:7px 15px;font-size:12px}
.btn-gh:hover{border-color:var(--red);color:var(--red)}
.btn-x{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:14px;padding:3px 6px;line-height:1;transition:color .12s;font-family:'Overpass',sans-serif}
.btn-x:hover{color:var(--red)}
.lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:5px}
.sec{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);margin-bottom:12px}
.tab{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:10px 15px;cursor:pointer;border:none;background:transparent;color:var(--ink3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-family:'Overpass',sans-serif}
.tab.on{color:var(--red);border-bottom-color:var(--red)}
.tab:hover:not(.on){color:var(--ink2)}
.card{background:#fff;border:1px solid var(--cr3);border-radius:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
@media(max-width:620px){.g2,.g3,.g4{grid-template-columns:1fr}}
.hr{border:none;border-top:1px solid var(--cr3);margin:18px 0}
.badge{display:inline-flex;align-items:center;background:var(--red-m);border:1px solid rgba(188,12,12,.2);color:var(--red);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:2px;font-family:'Overpass',sans-serif}
.warn{background:#fff9f0;border:1px solid #f0d080;color:#7a5a00;font-size:12px;padding:10px 14px;border-radius:2px}
.info{background:#f0f6ff;border:1px solid #b0ceee;color:#1a4070;font-size:12px;padding:10px 14px;border-radius:2px}
.pbar{height:5px;background:var(--cr2);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:var(--red);border-radius:3px;transition:width .35s}
.chk-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--cr2);transition:background .1s}
.chk-row:last-child{border-bottom:none}
.chk-row:hover{background:var(--cr)}
.fade{animation:fd .3s ease}
@keyframes fd{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
nav{background:#fff;border-bottom:1px solid var(--cr3);padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 1px 6px rgba(28,18,9,.05)}
.logo-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:0 18px 0 0;border-right:1px solid var(--cr3);margin-right:20px}
.logo-btn-svg{display:block}
.nav-spacer{flex:1}
.screen{max-width:900px;margin:0 auto;padding:38px 24px}
.screen-wide{max-width:1020px;margin:0 auto;padding:38px 24px}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;background:var(--cr3);border:1px solid var(--cr3);border-radius:3px;overflow:hidden;margin-bottom:32px}
.kpi-box{background:#fff;padding:16px 14px}
.kpi-val{font-family:'Lora',serif;font-size:22px;color:var(--red);line-height:1}
.kpi-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-top:3px}
.stop-hd{display:flex;align-items:center;gap:11px;padding:13px 18px;background:var(--cr);border-bottom:1px solid var(--cr3);cursor:pointer;user-select:none}
.stop-hd:hover{background:var(--cr2)}
.stop-body{padding:20px 20px 24px}
.tab-row{display:flex;border-bottom:1px solid var(--cr3);overflow-x:auto}
a{color:var(--red);text-decoration:none}
a:hover{text-decoration:underline}
.ov-hd{display:flex;align-items:center;gap:13px;padding:14px 20px;border-bottom:1px solid var(--cr3)}
.empty-state{border:2px dashed var(--cr3);padding:72px 40px;text-align:center;border-radius:3px}
.res-card{background:#fff;border:1px solid var(--cr3);border-radius:3px;overflow:hidden;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column}
.res-card:hover{border-color:var(--red);box-shadow:0 4px 18px var(--red-g)}
.res-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:2px;font-family:'Overpass',sans-serif}
.product-banner{background:var(--red);color:#fff;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
footer{background:#1c1209;color:#b5a898;padding:36px 24px;margin-top:60px}
.footer-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px}
@media(max-width:620px){.footer-inner{grid-template-columns:1fr}}

/* ── OVERLAY / MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(28,18,9,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:4px;max-width:540px;width:100%;box-shadow:0 20px 60px rgba(28,18,9,.25);overflow:hidden}
.modal-hd{background:var(--red);padding:28px 32px 24px}
.modal-body{padding:28px 32px 32px}

/* ── TRAVEL DAY TRACKER ── */
.day-tracker{background:#fff;border:1px solid var(--cr3);border-radius:3px;padding:14px 20px;display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.day-pip{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:background .2s}
.day-pip.used{background:var(--red)}
.day-pip.free{background:var(--cr3)}
.day-pip.over{background:#e05020}

/* ── SAFETY CARD ── */
.safety-card{background:#fff8f8;border:1px solid rgba(188,12,12,.18);border-radius:3px;padding:16px 18px;margin-top:16px}

/* ── ONBOARDING STEPS ── */
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35);flex-shrink:0;transition:background .2s}
.step-dot.on{background:#fff}

/* ── PRINT ── */
@media print{
  nav,footer,.no-print{display:none!important}
  body{background:#fff;color:#000;font-size:11px}
  .screen,.screen-wide{max-width:100%;padding:10px}
  .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;margin-bottom:12px}
  .stop-body{padding:10px 14px}
  .kpi-strip{break-inside:avoid}
  h1{font-size:20px}
  .tab-row,.btn,.btn-red,.btn-out,.btn-gh{display:none!important}
  .print-only{display:block!important}
  .ov-hd{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.print-only{display:none}

/* ── MOBILE ── */
@media(max-width:480px){
  nav{padding:0 12px;gap:0}
  .logo-btn{padding-right:12px;margin-right:10px}
  .screen,.screen-wide{padding:24px 14px}
  .day-tracker{gap:8px;padding:12px 14px}
  .modal-hd,.modal-body{padding:22px 20px}
  .stop-hd{padding:11px 14px;gap:8px}
  .stop-body{padding:14px 14px 18px}
}
</style>
</head>

// ── Document file upload handlers ────────────────────────────────────────────
window.handleDocFileDrop = function(e){
  Array.from(e.dataTransfer.files).forEach(f=>addDocFromFile(f));
};
window.handleDocFileSelect = function(input){
  Array.from(input.files).forEach(f=>addDocFromFile(f));
  input.value='';
};
function addDocFromFile(file){
  const t=getTrip();if(!t)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const cat=['pdf'].includes(ext)?'Booking':['jpg','jpeg','png','heic','gif','webp'].includes(ext)?'Other':
    ['doc','docx'].includes(ext)?'Other':'Booking';

  // Warn if file is very large (over 8MB it may slow the export file)
  if(file.size>8*1024*1024){
    showToast(`${file.name} is large (${(file.size/1024/1024).toFixed(1)}MB) — stored but may slow exports`,'warn');
  }

  const reader=new FileReader();
  reader.onload=ev=>{
    const doc={
      id:uid(),
      name:file.name,
      category:cat,
      link:'',
      ref:'',
      expiry:'',
      notes:`Uploaded ${new Date().toLocaleDateString('en-GB')} · ${(file.size/1024).toFixed(0)}KB`,
      fileName:file.name,
      fileSize:file.size,
      fileType:file.type||`application/${ext}`,
      fileData:ev.target.result  // full base64 data URL — enables reopen
    };
    t.documents.push(doc);
    persist();
    render();
    showToast(`${file.name} added — click Open to view it`);
  };
  reader.onerror=()=>showToast(`Could not read ${file.name}`,'warn');
  reader.readAsDataURL(file);
}

window.openDocFile=function(did){
  const t=getTrip();if(!t)return;
  const d=t.documents.find(x=>x.id==did);
  if(!d)return;
  if(d.fileData){
    // Open the stored file data in a new tab
    const win=window.open('','_blank');
    if(win){
      if(d.fileType&&d.fileType.startsWith('image/')){
        win.document.write(`<html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh">
          <img src="${d.fileData}" style="max-width:100%;max-height:100vh;object-fit:contain" alt="${d.fileName}">
        </body></html>`);
      } else {
        // For PDFs and other files, use an iframe
        win.document.write(`<html><head><title>${d.fileName}</title></head>
          <body style="margin:0"><iframe src="${d.fileData}" style="width:100vw;height:100vh;border:none"></iframe></body></html>`);
      }
      win.document.close();
    }
  } else if(d.link){
    openLink(d.link);
  } else {
    showToast('No file or link saved for this document','warn');
  }
};

  catch(e){window.location.href=url;}
}

// =====================================================================
// STORAGE — localStorage + auto-backup + export/import
// =====================================================================
const STORE_KEY  = 'tgc_interrail_v4';
const BACKUP_KEY = 'tgc_interrail_backup';
const VERSION    = '1.0';

function persist(){
  try{
    const payload = JSON.stringify({v:VERSION, ts:Date.now(), trips:S.trips, activeId:S.activeId});
    localStorage.setItem(STORE_KEY, payload);
    // Rolling backup — written every 5 minutes max so a bad save doesn't overwrite a good one
    const last = localStorage.getItem(BACKUP_KEY);
    const lastTs = last ? (JSON.parse(last).ts||0) : 0;
    if(Date.now() - lastTs > 5*60*1000) localStorage.setItem(BACKUP_KEY, payload);
  }catch(e){console.warn('TGC save failed:',e);}
}

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){
      const p = JSON.parse(raw);
      S.trips    = p.trips    || [];
      S.activeId = p.activeId || null;
      if(S.activeId) S.screen = 'plan';
    }
    S.emailSubmitted = !!localStorage.getItem('tgc_email_captured');
    if(!localStorage.getItem('tgc_onboarded')) S.showOnboarding = true;
  }catch(e){
    // Try backup if primary is corrupt
    try{
      const bk = localStorage.getItem(BACKUP_KEY);
      if(bk){
        const p = JSON.parse(bk);
        S.trips = p.trips || [];
        S.activeId = null;
        S.screen = 'home';
        console.warn('TGC: loaded from backup');
      }
    }catch(e2){}
  }
}

// ── Export: download a .tgc file to the user's computer ───────────────────────
function exportTrips(){
  const data = {
    _tgc: true,
    version: VERSION,
    exportedAt: new Date().toISOString(),
    trips: S.trips,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const name = S.trips.length===1
    ? (S.trips[0].name||'my-interrail-trip').toLowerCase().replace(/[^a-z0-9]+/g,'-')
    : 'all-interrail-trips';
  a.href     = url;
  a.download = `${name}.tgc`;
  a.click();
  URL.revokeObjectURL(url);
}

// Export single trip
function exportOneTrip(id){
  const trip = S.trips.find(t=>t.id==id);
  if(!trip) return;
  const data = {_tgc:true, version:VERSION, exportedAt:new Date().toISOString(), trips:[trip]};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${(trip.name||'trip').toLowerCase().replace(/[^a-z0-9]+/g,'-')}.tgc`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Import: read a .tgc file and merge trips in ───────────────────────────────
function importTrips(){
  const input = document.createElement('input');
  input.type  = 'file';
  input.accept= '.tgc,.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const data = JSON.parse(ev.target.result);
        if(!data._tgc || !Array.isArray(data.trips)){
          alert('This file does not look like a Travel Girls Corner trip file. Please use a .tgc file exported from this planner.');
          return;
        }
        let imported = 0;
        data.trips.forEach(trip=>{
          // Avoid exact duplicates (same id already exists)
          if(!S.trips.find(t=>t.id==trip.id)){
            S.trips.push(trip);
            imported++;
          }
        });
        if(imported===0){
          alert('These trips are already in your planner.');
        } else {
          persist();
          S.screen = 'home';
          render();
          // Show toast
          showToast(`${imported} trip${imported!==1?'s':''} imported successfully`);
        }
      }catch(err){
        alert('Could not read that file. Make sure it is a valid .tgc file exported from this planner.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Toast notification ─────────────────────────────────────────────────────────
function showToast(msg, type='success'){
  const existing = document.getElementById('tgc-toast');
  if(existing) existing.remove();
  const t = document.createElement('div');
  t.id = 'tgc-toast';
  t.innerHTML = msg;
  t.style.cssText = `
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    background:${type==='success'?'var(--red)':'#c08000'};color:#fff;
    padding:12px 24px;border-radius:3px;font-family:'Overpass',sans-serif;
    font-size:13px;font-weight:600;z-index:999;
    box-shadow:0 4px 20px rgba(0,0,0,.2);
    animation:toastIn .25s ease;white-space:nowrap;
  `;
  document.head.insertAdjacentHTML('beforeend','<style>@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}</style>');
  document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='0', 2500);
  setTimeout(()=>t.remove(), 2800);
}

function getTrip(){return S.trips.find(t=>t.id===S.activeId);}
function getStop(sid){const t=getTrip();return t?t.stops.find(s=>s.id==sid):null;}

function setNested(obj,path,val){
  const keys=path.split('.');
  let cur=obj;
  for(let i=0;i<keys.length-1;i++){if(!cur[keys[i]])cur[keys[i]]={};cur=cur[keys[i]];}
  cur[keys[keys.length-1]]=val;
}

// Called from inline oninput handlers
window.TF=function(key,val){
  const t=getTrip();if(!t)return;
  setNested(t,key,val);persist();
};

window.SF=function(sid,path,val){
  const s=getStop(sid);if(!s)return;
  setNested(s,path,val);persist();
};

function esc(s){
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fv(v,fb){return v!=null&&v!==''?v:fb||'';}
function checked(b){return b?'checked':'';}
function sel(a,b){return a===b?'selected':'';}

// =====================================================================
// ROUTE MAP SVG
// =====================================================================
function renderMap(stops){
  const W=540,H=320;
  const pts=stops.filter(s=>s.city).map(s=>{
    const key=s.city.toLowerCase().trim();
    const coords=CITY_COORDS[key]||CITY_COORDS[key.split(' ')[0]]||
      Object.entries(CITY_COORDS).find(([k])=>k.startsWith(key.substring(0,4)))?.[1]||null;
    if(!coords)return null;
    const minLng=-12,maxLng=42,minLat=34,maxLat=72;
    const x=((coords[1]-minLng)/(maxLng-minLng))*W;
    const y=((maxLat-coords[0])/(maxLat-minLat))*H;
    return{...s,x,y};
  }).filter(Boolean);

  if(!pts.length){
    return`<div style="height:240px;display:flex;align-items:center;justify-content:center;background:var(--cr2);border:1px solid var(--cr3);border-radius:2px"><div style="color:var(--ink3);font-size:13px;text-align:center">Add city names to see your route here</div></div>`;
  }

  let lines='',dots='';
  pts.slice(0,-1).forEach((p,i)=>{
    const n=pts[i+1];
    const len=Math.sqrt((n.x-p.x)**2+(n.y-p.y)**2);
    lines+=`<line x1="${p.x.toFixed(1)}" y1="${p.y.toFixed(1)}" x2="${n.x.toFixed(1)}" y2="${n.y.toFixed(1)}" stroke="#BC0C0C" stroke-width="1.8" stroke-dasharray="5,4" opacity="0.7"><animate attributeName="stroke-dashoffset" from="${len.toFixed(1)}" to="0" dur="2s" repeatCount="indefinite"/></line>`;
  });
  pts.forEach((p,i)=>{
    const isStart=i===0,isEnd=i===pts.length-1&&i!==0;
    dots+=`<g><circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="8" fill="white" stroke="#BC0C0C" stroke-width="1.5"/><circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="#BC0C0C"/><text x="${(p.x+11).toFixed(1)}" y="${(p.y+4).toFixed(1)}" style="font-family:Overpass,sans-serif;font-size:10px;font-weight:700;fill:#1c1209">${esc(p.city)}</text>${isStart?`<text x="${p.x.toFixed(1)}" y="${(p.y-12).toFixed(1)}" text-anchor="middle" style="font-family:Overpass,sans-serif;font-size:8px;fill:#BC0C0C;font-weight:700;letter-spacing:1">START</text>`:''}${isEnd?`<text x="${p.x.toFixed(1)}" y="${(p.y-12).toFixed(1)}" text-anchor="middle" style="font-family:Overpass,sans-serif;font-size:8px;fill:#BC0C0C;font-weight:700;letter-spacing:1">END</text>`:''}</g>`;
  });

  const grid=Array.from({length:8},(_,i)=>`<line x1="0" y1="${((H/8)*i).toFixed(0)}" x2="${W}" y2="${((H/8)*i).toFixed(0)}" stroke="#e8e0d0" stroke-width="0.5"/>`).join('')+
    Array.from({length:12},(_,i)=>`<line x1="${((W/12)*i).toFixed(0)}" y1="0" x2="${((W/12)*i).toFixed(0)}" y2="${H}" stroke="#e8e0d0" stroke-width="0.5"/>`).join('');

  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block"><rect width="${W}" height="${H}" fill="#f5f0e6" rx="3"/>${grid}${lines}${dots}<text x="8" y="${H-7}" style="font-family:Overpass,sans-serif;font-size:9px;fill:#9a8a78;letter-spacing:1">♡ TRAVEL GIRLS CORNER · INTERRAIL PLANNER</text></svg>`;
}

// =====================================================================
// TRAVEL DAY TRACKER
// =====================================================================
function renderDayTracker(trip){
  const total=Number(trip.totalTravelDays)||0;
  if(!total)return'';
  // Count stops that have a train number (each = one travel day used)
  const used=trip.stops.filter(s=>s.train?.number||s.train?.reservationBooked).length;
  // Count day trips that use a travel day
  const dayTripDays=trip.stops.reduce((a,s)=>a+(s.dayTrips||[]).filter(d=>d.usesTravelDay).length,0);
  const totalUsed=used+dayTripDays;
  const over=totalUsed>total;
  const pct=Math.min(100,(totalUsed/total)*100);
  const pips=Array.from({length:Math.min(total,30)},(_,i)=>{
    const cls=i<totalUsed?(over&&i>=total?'over':'used'):'free';
    return`<div class="day-pip ${cls}" title="${i+1}${i<totalUsed?': travel day used':''}"></div>`;
  }).join('');
  return`<div class="day-tracker no-print">
    <div style="flex-shrink:0;text-align:center;min-width:44px">
      <div class="lora" style="font-size:22px;color:${over?'#e05020':'var(--red)'};">${totalUsed}</div>
      <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3)">of ${total}</div>
    </div>
    <div style="flex:1">
      <div style="font-size:11px;font-weight:700;color:${over?'#e05020':'var(--ink2)'};margin-bottom:6px">Travel Days Used${over?` ${IC.warn} ${totalUsed-total} over your pass limit!`:totalUsed===total?' All days used':''}</div>
      <div style="display:flex;gap:3px;flex-wrap:wrap">${pips}</div>
    </div>
    <div style="font-size:11px;color:var(--ink3);text-align:right;flex-shrink:0;line-height:1.5">
      <div style="font-weight:700;color:var(--ink2)">${total-totalUsed>=0?total-totalUsed:0} days left</div>
      <div style="font-size:10px">on your pass</div>
    </div>
  </div>`;
}

// COUNTRY SAFETY CARD
// =====================================================================
function renderSafetyCard(country){
  if(!country)return'';
  // Try exact match, then first word
  const info=COUNTRY_SAFETY[country]||COUNTRY_SAFETY[country.split(' ')[0]]||null;
  if(!info)return'';
  const ratingColor={Excellent:'#1a6040',VeryGood:'#1a4080','Very Good':'#1a4080',Good:'#5a5000'}[info.safetyRating.replace(' ','')] || '#555';
  return`<div class="safety-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red)">${IC.person} Women's Travel Info: ${esc(country)}</div>
      <span style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${ratingColor};background:${ratingColor}15;border:1px solid ${ratingColor}33;padding:2px 9px;border-radius:2px">Safety: ${info.safetyRating}</span>
    </div>
    <div class="g2" style="margin-bottom:10px">
      <div><span style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3)">Emergency</span><div style="font-size:13px;font-weight:700;color:var(--ink);margin-top:3px">${esc(info.emergency)}</div></div>
      <div><span style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3)">Currency</span><div style="font-size:13px;color:var(--ink);margin-top:3px">${esc(info.currency)}</div></div>
    </div>
    <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px">Solo Tips</div>
    ${info.tips.map(t=>`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:5px"><span style="flex-shrink:0;margin-top:1px">${IC.heart}</span><span style="font-size:12px;color:var(--ink2);line-height:1.5;font-weight:300">${esc(t)}</span></div>`).join('')}
    ${info.guide?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(188,12,12,.12)"><a href="${info.guide.url}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:var(--red);display:inline-flex;align-items:center;gap:4px">${IC.book} ${esc(info.guide.label)} →</a></div>`:''}
  </div>`;
}

        <div style="background:${idx===0?'#BC0C0C':'#f3ede3'};padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <div>
            <span style="font-family:'Lora',serif;font-size:17px;color:${idx===0?'#fff':'#1c1209'}">${esc(stop.city||'n/a')}${stop.country?`<span style="opacity:.6;font-size:14px">, ${esc(stop.country)}</span>`:''}</span>
          </div>
          <div style="display:flex;gap:12px;font-size:11px;color:${idx===0?'rgba(255,255,255,.7)':'#8a7a68'}">
            ${stop.nights>0?`<span>${IC.moon} ${stop.nights} nights</span>`:''}
            ${stop.arrivalDate?`<span>${IC.cal} ${stop.arrivalDate}${stop.departureDate?' → '+stop.departureDate:''}</span>`:''}
            ${stop.budgetPerDay?`<span>${IC.tag} ${esc(stop.budgetPerDay)}/day</span>`:''}
          </div>
        </div>
        <div style="padding:12px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;font-size:11px">
          <div>
            <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#BC0C0C;margin-bottom:5px">Transport In</div>
            ${stop.train?.number?`<div style="line-height:1.7">
              ${stop.train.isNightTrain?IC.moon:IC.train} <strong>${esc(stop.train.number)}</strong><br>
              ${stop.train.from&&stop.train.to?`${esc(stop.train.from)} → ${esc(stop.train.to)}<br>`:''}
              ${stop.train.depTime?`Dep: ${stop.train.depTime}${stop.train.arrTime?' Arr: '+stop.train.arrTime:''}<br>`:''}
              ${stop.train.bookingRef?`Ref: <strong>${esc(stop.train.bookingRef)}</strong><br>`:''}
              ${stop.train.reservationBooked?'<span style="color:#1a6040"><strong>Res. confirmed</strong></span>':stop.train.reservationRequired?'<span style="color:#c08000">Res. needed: book now</span>':''}
            </div>`:stop.flight?.number?`${IC.plane} ${esc(stop.flight.number)}${stop.flight.bookingRef?`<br>Ref: ${esc(stop.flight.bookingRef)}`:''}`:
            '<span style="color:#b5a898;font-style:italic">Not added</span>'}
          </div>
          <div>
            <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#BC0C0C;margin-bottom:5px">Hotel</div>
            ${stop.hotel?.name?`<div style="line-height:1.7">
              <strong>${esc(stop.hotel.name)}</strong><br>
              ${stop.hotel.address?`${esc(stop.hotel.address)}<br>`:''}
              ${stop.hotel.checkIn?`In: ${stop.hotel.checkIn}${stop.hotel.checkOut?' Out: '+stop.hotel.checkOut:''}<br>`:''}
              ${stop.hotel.bookingRef?`Ref: <strong>${esc(stop.hotel.bookingRef)}</strong><br>`:''}
              ${stop.hotel.cancellationDeadline?`<span style="color:#c08000">Cancel by: ${stop.hotel.cancellationDeadline}</span>`:''}
            </div>`:'<span style="color:#b5a898;font-style:italic">Not added</span>'}
          </div>
          <div>
            <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#BC0C0C;margin-bottom:5px">To Do</div>
            ${stop.places?.length?stop.places.slice(0,6).map(p=>`<div style="margin-bottom:3px">${TE[p.type]||'✦'} ${esc(p.name)}${p.done?' ✓':''}</div>`).join('')+''+
            (stop.places.length>6?`<div style="color:#8a7a68">+ ${stop.places.length-6} more</div>`:'')
            :'<span style="color:#b5a898;font-style:italic">Nothing added</span>'}
          </div>
        </div>
        ${stop.notes?`<div style="padding:0 16px 12px"><div style="background:#f5f0e8;padding:8px 12px;border-radius:2px;font-size:11px"><strong>Notes:</strong> ${esc(stop.notes)}</div></div>`:''}
      </div>
    `).join('')}

    <!-- Emergency contacts & docs -->
    ${(trip.travellers||[]).some(v=>v.emergencyContact)?`
    <div style="border:1px solid #e9e0d2;border-radius:3px;padding:14px 16px;margin-bottom:14px;break-inside:avoid">
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#BC0C0C;margin-bottom:8px">Emergency Contacts</div>
      ${(trip.travellers||[]).filter(v=>v.name&&v.emergencyContact).map(v=>`<div style="font-size:12px;margin-bottom:4px"><strong>${esc(v.name)}:</strong> ${esc(v.emergencyContact)}</div>`).join('')}
    </div>`:''}

    ${(trip.documents||[]).length?`
    <div style="border:1px solid #e9e0d2;border-radius:3px;padding:14px 16px;margin-bottom:14px;break-inside:avoid">
      <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#BC0C0C;margin-bottom:8px">Key Documents & References</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${(trip.documents||[]).map(d=>`<div style="font-size:11px;line-height:1.5"><strong>${esc(d.name||'Untitled')}</strong>${d.ref?` (Ref: ${esc(d.ref)})`:''}${d.expiry?`<br><span style="color:#c08000">Expires: ${esc(d.expiry)}</span>`:''}${d.notes?`<br>${esc(d.notes)}`:''}</div>`).join('')}
      </div>
    </div>`:''}

    <div style="text-align:center;padding:16px;font-size:10px;color:#b5a898;border-top:1px solid #e9e0d2;margin-top:8px">
      Generated with ♡ by Travel Girls Corner Interrail Planner | travelgirlscorner.com
    </div>
  </div>`;
}

// =====================================================================
// HOME SCREEN
// =====================================================================
function renderHome(){
  const totalNights=S.trips.reduce((a,t)=>a+(t.stops?.reduce((b,s)=>b+(Number(s.nights)||0),0)||0),0);
  const stats=S.trips.length?`
    <div style="display:flex;gap:12px">
      ${[{l:'Trips',v:S.trips.length},{l:'Destinations',v:S.trips.reduce((a,t)=>a+(t.stops?.length||0),0)},{l:'Nights',v:totalNights}].map(s=>`
        <div style="text-align:center;padding:14px 18px;background:#fff;border:1px solid var(--cr3);min-width:72px">
          <div class="lora" style="font-size:26px;color:var(--red);line-height:1">${s.v}</div>
          <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-top:4px">${s.l}</div>
        </div>`).join('')}
    </div>`:'';

  const tripList=S.trips.length?S.trips.map(trip=>{
    const nights=trip.stops?.reduce((a,s)=>a+(Number(s.nights)||0),0)||0;
    const pd=trip.packing?.filter(p=>p.packed).length||0;
    const cd=trip.checklist?.filter(c=>c.done).length||0;
    const pr=trip.stops?.filter(s=>s.train?.reservationRequired&&!s.train?.reservationBooked).length||0;
    const names=trip.travellers?.filter(v=>v.name).map(v=>v.name).join(', ')||'';
    return`<div class="card" style="padding:20px 24px;cursor:pointer;transition:border-color .15s,box-shadow .15s" data-action="openTrip" data-id="${trip.id}" data-view="${trip.saved?'overview':'plan'}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
            <h3 class="lora" style="font-size:19px;font-weight:400">${esc(trip.name)}</h3>
            ${trip.saved?'<span class="badge">Saved</span>':''}
            ${pr>0?`<span class="badge" style="background:#fff9f0;border-color:#e0b040;color:#7a5000">${pr} reservation${pr!==1?'s':''} pending</span>`:''}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--ink3);font-weight:300">
            ${trip.startDate?`<span>${IC.cal} ${trip.startDate}${trip.endDate?' → '+trip.endDate:''}</span>`:''}
            ${trip.passType?`<span>${IC.ticket} ${trip.passType.split('-')[0].trim()}</span>`:''}
            ${nights>0?`<span>${IC.moon} ${nights} nights</span>`:''}
            ${names?`<span>${IC.people} ${esc(names)}</span>`:''}
            ${trip.packing?.length?`<span>${IC.bag} ${pd}/${trip.packing.length} packed</span>`:''}
            ${trip.checklist?.length?`<span>${IC.checkc} ${cd}/${trip.checklist.length} ready</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          <button class="btn btn-gh" style="font-size:11px" data-action="openTrip" data-id="${trip.id}" data-view="plan">Edit</button>
          ${trip.saved?`<button class="btn btn-out" style="font-size:11px;padding:6px 14px" data-action="openTrip" data-id="${trip.id}" data-view="overview">Overview</button>`:''}
          <button class="btn btn-gh" style="font-size:11px" data-action="exportTrip" data-id="${trip.id}" title="Save this trip to your computer">${IC.note} Save</button>
          <button class="btn-x" data-action="deleteTrip" data-id="${trip.id}">✕</button>
        </div>
      </div>
    </div>`;
  }).join(''):
  `<div class="empty-state">
    <div style="margin-bottom:18px">${IC.train}</div>
    <h2 class="lora" style="font-size:24px;margin-bottom:10px;font-weight:400">No trips yet</h2>
    <p style="color:var(--ink3);font-size:14px;margin-bottom:26px;font-weight:300">Create your first Interrail adventure and start organising everything in one place.</p>
    <button class="btn btn-red" data-action="createTrip">+ Create Your First Trip</button>
  </div>`;

  return`<div class="screen fade">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:16px">
      <div>
        <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:10px;font-weight:700">Travel Girls Corner</div>
        <h1 class="lora" style="font-size:clamp(30px,5vw,50px);line-height:1.05;font-weight:400">Interrail<br><em>Trip Planner</em></h1>
        <p style="color:var(--ink3);font-size:13px;margin-top:10px;font-weight:300">Plan, organise &amp; track your European rail adventure</p>
      </div>
      ${stats}
    </div>

    <!-- Save & Load banner -->
    <div style="background:var(--cr2);border:1px solid var(--cr3);border-radius:3px;padding:16px 22px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:3px">Keep your trips safe</div>
        <div style="font-size:11px;color:var(--ink3);font-weight:300;line-height:1.5">Your planner saves automatically in this browser. To keep a permanent backup or move to another device, download your trips as a file.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0">

// =====================================================================
// PLAN SCREEN
// =====================================================================
function renderPlan(){
  const trip=getTrip();
  if(!trip)return'';

  const pd=trip.packing?.filter(p=>p.packed).length||0;
  const cd=trip.checklist?.filter(c=>c.done).length||0;
  const pr=trip.stops?.filter(s=>s.train?.reservationRequired&&!s.train?.reservationBooked)||[];

  const TABS=[
    {id:'details',    label:'Trip Details',    hint:'Dates, name and currency'},
    {id:'pass',       label:'Pass & Budget',   hint:'Your Interrail pass and budget'},
    {id:'travellers', label:'Travellers',      hint:'Who is coming on the trip'},
    {id:'itinerary',  label:'Itinerary',       hint:'Stops, trains, hotels and places'},
    {id:'packing',    label:'Packing List',    hint:'What to bring'},
    {id:'checklist',  label:'Checklist',       hint:'Pre-trip tasks to complete'},
    {id:'documents',  label:'Documents',       hint:'Booking refs and important links'},
  ];

  const currentIdx=TABS.findIndex(t=>t.id===trip.planTab);
  const isFirst=currentIdx===0;
  const isLast=currentIdx===TABS.length-1;
  const prevTab=isFirst?null:TABS[currentIdx-1];
  const nextTab=isLast?null:TABS[currentIdx+1];

  const warn=pr.length?`<div class="warn" style="margin-bottom:20px">${IC.warn} <strong>${pr.length} train${pr.length!==1?'s':''}</strong> marked as needing a reservation but not yet booked: ${pr.map(s=>esc(s.city||'unnamed')).join(', ')}</div>`:'';

  let content='';
  switch(trip.planTab){
    case'details':    content=renderPlanDetails(trip);break;
    case'pass':       content=renderPlanPass(trip);break;
    case'travellers': content=renderPlanTravellers(trip);break;
    case'itinerary':  content=renderPlanItinerary(trip);break;
    case'packing':    content=renderPlanPacking(trip);break;
    case'checklist':  content=renderPlanChecklist(trip);break;
    case'documents':  content=renderPlanDocuments(trip);break;
  }

  // ── Stepper ──────────────────────────────────────────────────────────────
  const stepper=`
    <div style="display:flex;align-items:flex-start;gap:0;margin-bottom:32px;overflow-x:auto;padding-bottom:4px">
      ${TABS.map((t,i)=>{
        const done=i<currentIdx;
        const active=i===currentIdx;
        const future=i>currentIdx;
        return`<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:60px;cursor:pointer;position:relative" data-action="setPlanTab" data-tab="${t.id}">
          <div style="display:flex;align-items:center;width:100%;justify-content:center;margin-bottom:8px">
            ${i>0?`<div style="height:2px;flex:1;background:${done||active?'var(--red)':'var(--cr3)'};transition:background .3s"></div>`:''}
            <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;font-family:'Overpass',sans-serif;transition:all .2s;
              ${done?`background:var(--red);color:#fff;border:2px solid var(--red)`:
                active?`background:var(--red);color:#fff;border:2px solid var(--red);box-shadow:0 0 0 4px rgba(188,12,12,.15)`:
                `background:#fff;color:var(--ink3);border:2px solid var(--cr3)`}">
              ${done?IC.check:String(i+1)}
            </div>
            ${i<TABS.length-1?`<div style="height:2px;flex:1;background:${done?'var(--red)':'var(--cr3)'};transition:background .3s"></div>`:''}
          </div>
          <div style="font-size:10px;font-weight:${active?'700':'400'};color:${active?'var(--red)':done?'var(--ink2)':'var(--ink3)'};text-align:center;line-height:1.3;letter-spacing:0;padding:0 4px;font-family:'Overpass',sans-serif">
            ${t.label}
          </div>
        </div>`;
      }).join('')}
    </div>`;

  // ── Current step header ───────────────────────────────────────────────────
  const stepHeader=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--cr3)">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'Overpass',sans-serif;flex-shrink:0">${currentIdx+1}</div>
      <div>
        <div class="lora" style="font-size:20px;font-weight:400;line-height:1.1">${TABS[currentIdx].label}</div>
        <div style="font-size:12px;color:var(--ink3);font-weight:300;margin-top:2px">${TABS[currentIdx].hint}</div>
      </div>
      <div style="margin-left:auto;font-size:11px;color:var(--ink3);font-weight:400;white-space:nowrap">Step ${currentIdx+1} of ${TABS.length}</div>
    </div>`;

  // ── Nav footer ────────────────────────────────────────────────────────────
  const navFooter=isLast?`
    <div style="margin-top:32px;padding:22px 28px;background:var(--red);border-radius:3px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">
      <div>
        <div style="font-size:14px;color:#fff;font-weight:700;font-family:'Overpass',sans-serif;margin-bottom:4px">All done? Save and see your overview</div>
        <div style="font-size:12px;color:rgba(255,255,255,.75);font-weight:300">Your route map, charts and full itinerary summary will be generated.</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <button class="btn" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);padding:10px 18px;font-size:12px" data-action="setPlanTab" data-tab="${prevTab.id}">&#8592; Back</button>
        <button class="btn" style="background:#fff;color:var(--red);padding:12px 28px;font-size:14px;font-weight:700;font-family:'Overpass',sans-serif" data-action="saveOverview">Save &amp; View Overview &rarr;</button>
      </div>
    </div>
    <div style="margin-top:10px;background:var(--cr2);border:1px solid var(--cr3);border-radius:3px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div style="font-size:11px;color:var(--ink3);font-weight:300">${IC.info} Your trip auto-saves in this browser. Download a backup file so you never lose your data.</div>
      <button class="btn btn-gh" style="font-size:11px;flex-shrink:0" data-action="exportTrip" data-id="${getTrip()?.id||''}">${IC.note} Download backup file</button>
    </div>
    <div style="margin-top:10px;text-align:right">
      <button class="btn btn-gh" style="color:#b03030;border-color:#f0dede;font-size:12px" data-action="deleteCurrent">Delete Trip</button>
    </div>`:`
    <div style="margin-top:32px;display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-top:1px solid var(--cr3);flex-wrap:wrap;gap:12px">
      <div>
        ${!isFirst?`<button class="btn btn-gh" style="font-size:13px;padding:10px 20px" data-action="setPlanTab" data-tab="${prevTab.id}">&#8592; ${prevTab.label}</button>`:'<div></div>'}
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:11px;color:var(--ink3);font-weight:300">Step ${currentIdx+1} of ${TABS.length}</div>
        <button class="btn btn-red" style="font-size:13px;padding:11px 28px" data-action="setPlanTab" data-tab="${nextTab.id}">Next: ${nextTab.label} &rarr;</button>
      </div>
    </div>`;

  return`<div class="screen fade">
    <input class="lora" style="background:transparent;border:none;border-bottom:2px solid var(--cr3);font-size:clamp(22px,4vw,34px);color:var(--ink);padding:4px 0;width:100%;outline:none;margin-bottom:28px;font-weight:400" value="${esc(trip.name)}" placeholder="Trip name..." oninput="TF('name',this.value)">
    ${renderDayTracker(trip)}
    ${warn}
    ${stepper}
    <div class="card" style="padding:24px 26px">
      ${stepHeader}
      ${content}
    </div>
    ${navFooter}
  </div>`;
}

  return`<div class="card" style="padding:22px 26px">
    <div class="sec">Trip Details</div>
    <div class="g3" style="margin-bottom:14px">
      <div><label class="lbl">Start Date</label><input type="date" value="${esc(trip.startDate)}" oninput="TF('startDate',this.value)"></div>

}

    <a href="https://travelgirlscorner.com/does-the-interrail-pass-include-eurostar/" style="font-size:11px;font-weight:700;color:var(--red);background:var(--cr2);border:1px solid var(--cr3);padding:5px 11px;border-radius:2px" onclick="event.preventDefault();openLink('https://travelgirlscorner.com/does-the-interrail-pass-include-eurostar/')">${IC.book} Does Interrail include Eurostar?</a>
    <a href="https://www.interrail.eu/en/buy-your-pass" style="font-size:11px;font-weight:700;color:var(--red);background:var(--cr2);border:1px solid var(--cr3);padding:5px 11px;border-radius:2px" onclick="event.preventDefault();openLink('https://www.interrail.eu/en/buy-your-pass')">${IC.ticket} Buy your Interrail Pass</a>
  </div>
    </div>
    <div class="card" style="padding:22px 26px">
      <div class="sec">Budget</div>
      <div class="g2" style="margin-bottom:14px">
        <div><label class="lbl">Total Trip Budget</label><input value="${esc(trip.totalBudget)}" placeholder="e.g. £2,500" oninput="TF('totalBudget',this.value)"></div>
        <div><label class="lbl">Pass Cost</label><input readonly value="${esc(trip.passCost||'n/a')}" style="background:var(--cr2);cursor:not-allowed"></div>

        <div><label class="lbl">Nationality</label><input value="${esc(v.nationality)}" placeholder="e.g. British" oninput="travField('${v.id}','nationality',this.value)"></div>

function renderPlanItinerary(trip){
  const stops=trip.stops.map((s,i)=>renderStopCard(s,i,trip)).join('');
  return`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="sec" style="margin:0">Itinerary</div>
      <button class="btn btn-red" style="font-size:12px;padding:8px 16px" data-action="addStop">+ Add Stop</button>
    </div>
    ${stops||'<div class="card" style="padding:40px;text-align:center"><div style="color:var(--ink3)">No stops yet. Add your first destination.</div></div>'}
    ${trip.stops.length?'<div style="text-align:center;margin-top:8px"><button class="btn btn-gh" data-action="addStop">+ Add Another Stop</button></div>':''}
  </div>`;
}

function renderStopCard(stop,idx,trip){
  const hasSolo=trip.travellers?.some(v=>v.soloTraveller);
  const resAlert=stop.train?.reservationRequired&&!stop.train?.reservationBooked;
  const TABS=['overview','train','hotel','places','day-trips','notes'];

  let body='';
  switch(stop.activeTab){
    case'overview':body=renderStopOverview(stop);break;
    case'train':body=renderStopTrain(stop,hasSolo);break;
    case'hotel':body=renderStopHotel(stop);break;
    case'places':body=renderStopPlaces(stop);break;
    case'day-trips':body=renderStopDayTrips(stop);break;
    case'notes':body=renderStopNotes(stop);break;
  }

  const tabLabel=t=>{
    if(t==='places')return`Places${stop.places?.length?' ('+stop.places.length+')':''}`;
    if(t==='day-trips')return`Day Trips${stop.dayTrips?.length?' ('+stop.dayTrips.length+')':''}`;
    if(t==='train')return`Train${resAlert?' '+IC.warn:''}`;
    return t.charAt(0).toUpperCase()+t.slice(1);
  };

  return`<div class="card fade" style="margin-bottom:11px;overflow:hidden">
    <div class="stop-hd" data-action="toggleStop" data-sid="${stop.id}">
      <div style="display:flex;flex-direction:column;gap:2px">
        <button class="btn-x" style="font-size:10px" data-action="moveStop" data-sid="${stop.id}" data-dir="-1">▲</button>
        <button class="btn-x" style="font-size:10px" data-action="moveStop" data-sid="${stop.id}" data-dir="1">▼</button>
      </div>
      <span class="badge" style="min-width:24px;justify-content:center">${idx+1}</span>
      ${resAlert?'<div style="width:7px;height:7px;border-radius:50%;background:#e0a000;flex-shrink:0" title="Reservation needed"></div>':''}
      <div style="flex:1">
        <div class="lora" style="font-size:16px;font-weight:400">${stop.city?esc(stop.city):'<span style="color:var(--ink3);font-style:italic">New Stop</span>'}${stop.country?`<span style="color:var(--ink3);font-size:13px">, ${esc(stop.country)}</span>`:''}</div>
        <div style="font-size:11px;color:var(--ink3);display:flex;gap:11px;margin-top:2px;flex-wrap:wrap;font-weight:300">
          ${stop.nights>0?`<span>${IC.moon} ${stop.nights}n</span>`:''}
          ${stop.arrivalDate?`<span>${IC.cal} ${stop.arrivalDate}</span>`:''}
          ${stop.train?.isNightTrain?`<span style="color:var(--red)">${IC.moon} Night train</span>`:''}
          ${stop.hotel?.name?`<span>${IC.hotel} ${esc(stop.hotel.name)}</span>`:''}
          ${stop.places?.length?`<span>${IC.pin} ${stop.places.length}</span>`:''}
          ${stop.dayTrips?.length?`<span>${IC.map} ${stop.dayTrips.length} day trip${stop.dayTrips.length!==1?'s':''}</span>`:''}
        </div>
      </div>
      <button class="btn-x" style="color:#c08080" data-action="delStop" data-sid="${stop.id}">✕</button>
      <span style="color:var(--ink3);font-size:17px">${stop.expanded?'▾':'▸'}</span>
    </div>
    ${stop.expanded?`
    <div class="tab-row">
      ${TABS.map(t=>`<button class="tab${stop.activeTab===t?' on':''}" data-action="setStopTab" data-sid="${stop.id}" data-tab="${t}">${tabLabel(t)}</button>`).join('')}
    </div>
    <div class="stop-body">${body}</div>`:''}
  </div>`;
}

function renderStopOverview(s){

function renderPlanPacking(trip){
  const pd=trip.packing?.filter(p=>p.packed).length||0;
  const total=trip.packing?.length||0;
  const cats=PACK_CATS.map(cat=>{
    const items=(trip.packing||[]).filter(p=>p.cat===cat);
    if(!items.length)return'';
    const done=items.filter(p=>p.packed).length;
    const rows=items.map(item=>`
      <div class="chk-row">
        <input type="checkbox" ${checked(item.packed)} onchange="packToggle('${item.id}')">
        <input value="${esc(item.name)}" style="flex:1;border:none;background:transparent;padding:0;font-size:13px;${item.packed?'text-decoration:line-through;color:var(--ink3)':''}" placeholder="Item..." oninput="packField('${item.id}','name',this.value)">
        <select style="width:100px;padding:4px 6px;font-size:11px;border:1px solid var(--cr3);color:var(--ink3)" onchange="packField('${item.id}','cat',this.value)">
          ${PACK_CATS.map(c=>`<option ${sel(item.cat,c)}>${c}</option>`).join('')}
        </select>
        <button class="btn-x" data-action="delPackItem" data-iid="${item.id}">✕</button>
      </div>`).join('');
    return`<div class="card" style="margin-bottom:12px;overflow:hidden">
      <div style="padding:11px 16px;background:var(--cr2);border-bottom:1px solid var(--cr3);display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink2)">${cat}</span>
        <span style="font-size:11px;color:var(--ink3)">${done}/${items.length}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');

  return`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div><div class="sec" style="margin:0 0 3px">Packing List</div><div style="font-size:12px;color:var(--ink3)">${pd} of ${total} packed</div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <a href="https://travelgirlscorner.com/what-to-take-interrailing-from-a-fellow-travel-enthusiast/" style="font-size:11px;font-weight:700;white-space:nowrap;color:var(--red)" onclick="event.preventDefault();openLink('https://travelgirlscorner.com/what-to-take-interrailing-from-a-fellow-travel-enthusiast/')">${IC.book} What to pack guide</a>
        <a href="https://travelgirlscorner.com/best-interrail-backpack-2026-the-bag-that-got-me-through-5-weeks-of-backpacking/" style="font-size:11px;font-weight:700;white-space:nowrap;color:var(--red)" onclick="event.preventDefault();openLink('https://travelgirlscorner.com/best-interrail-backpack-2026-the-bag-that-got-me-through-5-weeks-of-backpacking/')">${IC.bag} Best backpack guide</a>

      </div>
    </div>
    <div class="pbar" style="margin-bottom:22px"><div class="pfill" style="width:${total?(pd/total)*100:0}%"></div></div>
    ${cats}
  </div>`;
}

function renderPlanChecklist(trip){
  const cd=trip.checklist?.filter(c=>c.done).length||0;
  const total=trip.checklist?.length||0;
  const cats=CHECK_CATS.map(cat=>{
    const items=(trip.checklist||[]).filter(c=>c.cat===cat);
    if(!items.length)return'';
    const done=items.filter(c=>c.done).length;
    const rows=items.map(item=>`
      <div class="chk-row">
        <input type="checkbox" ${checked(item.done)} onchange="checkToggle('${item.id}')">
        <input value="${esc(item.label)}" style="flex:1;border:none;background:transparent;padding:0;font-size:13px;${item.done?'text-decoration:line-through;color:var(--ink3)':''}" placeholder="Task..." oninput="checkField('${item.id}','label',this.value)">
        <select style="width:100px;padding:4px 6px;font-size:11px;border:1px solid var(--cr3);color:var(--ink3)" onchange="checkField('${item.id}','cat',this.value)">
          ${CHECK_CATS.map(c=>`<option ${sel(item.cat,c)}>${c}</option>`).join('')}
        </select>
        <button class="btn-x" data-action="delCheckItem" data-iid="${item.id}">✕</button>

    return`<div class="card" style="margin-bottom:12px;overflow:hidden">
      <div style="padding:11px 16px;background:var(--cr2);border-bottom:1px solid var(--cr3);display:flex;justify-content:space-between">
        <span style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink2)">${cat}</span>

  return`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div><div class="sec" style="margin:0 0 3px">Pre-Trip Checklist</div><div style="font-size:12px;color:var(--ink3)">${cd} of ${total} tasks complete</div></div>
      <button class="btn btn-out" style="font-size:11px;padding:7px 15px" data-action="addCheckItem">+ Add Task</button>
    </div>
    <div class="pbar" style="margin-bottom:22px"><div class="pfill" style="width:${total?(cd/total)*100:0}%"></div></div>
    <div style="background:var(--cr2);border:1px solid var(--cr3);border-radius:2px;padding:12px 14px;margin-bottom:18px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px">Apps to download before you go</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
        <a href="https://www.interrail.eu/en/plan-your-trip/rail-planner-app" style="font-size:11px;font-weight:700;color:var(--red);background:#fff;border:1px solid var(--cr3);padding:4px 10px;border-radius:2px" onclick="event.preventDefault();openLink('https://www.interrail.eu/en/plan-your-trip/rail-planner-app')">Rail Planner app</a>
        <a href="https://www.bahn.de/en/booking-information/booking-online/db-navigator-app" style="font-size:11px;font-weight:700;color:var(--red);background:#fff;border:1px solid var(--cr3);padding:4px 10px;border-radius:2px" onclick="event.preventDefault();openLink('https://www.bahn.de/en/booking-information/booking-online/db-navigator-app')">DB Navigator</a>
        <a href="https://www.trainline.com/download" style="font-size:11px;font-weight:700;color:var(--red);background:#fff;border:1px solid var(--cr3);padding:4px 10px;border-radius:2px" onclick="event.preventDefault();openLink('https://www.trainline.com/download')">Trainline</a>
        <a href="https://travel.ec.europa.eu/etias_en" style="font-size:11px;font-weight:700;color:var(--red);background:#fff;border:1px solid var(--cr3);padding:4px 10px;border-radius:2px" onclick="event.preventDefault();openLink('https://travel.ec.europa.eu/etias_en')">ETIAS (EU travel auth)</a>
        <a href="https://www.ehic.org.uk" style="font-size:11px;font-weight:700;color:var(--red);background:#fff;border:1px solid var(--cr3);padding:4px 10px;border-radius:2px" onclick="event.preventDefault();openLink('https://www.ehic.org.uk')">EHIC / GHIC card</a>
      </div>
      <a href="https://travelgirlscorner.com/what-to-take-interrailing-from-a-fellow-travel-enthusiast/" style="font-size:11px;color:var(--ink3)" onclick="event.preventDefault();openLink('https://travelgirlscorner.com/what-to-take-interrailing-from-a-fellow-travel-enthusiast/')">${IC.book} Full Interrail packing & prep guide →</a>
    </div>
    ${cats}
  </div>`;
}

    <div class="card" style="padding:16px 20px;margin-bottom:10px;${d.fileData?'border-left:3px solid var(--red)':''}">

        <div style="display:flex;align-items:center;gap:8px;min-width:0">

      ondrop="event.preventDefault();this.style.borderColor='var(--cr3)';this.style.background='#fff';handleDocFileDrop(event)">

      <div style="color:var(--ink3);font-size:13px;line-height:1.6">
        ${IC.clip} <strong style="color:var(--ink2)">Drag files here</strong> or click to upload<br>
        <span style="font-size:11px;font-weight:300">PDFs, images, booking confirmations — stored in your planner and reopenable any time</span>
      </div>
    </div>
    ${docs||'<div style="padding:20px;text-align:center;color:var(--ink3);font-size:12px">No entries yet. Add links to booking confirmations, insurance, visa docs and more.</div>'}
  </div>`;
}
