function renderOverview(){
  const trip=getTrip();
  if(!trip)return'';
  const totalNights=trip.stops.reduce((a,s)=>a+(Number(s.nights)||0),0);
  const totalPlaces=trip.stops.reduce((a,s)=>a+(s.places?.length||0),0);
  const doneP=trip.stops.reduce((a,s)=>a+(s.places?.filter(p=>p.done)?.length||0),0);
  const pd=trip.packing?.filter(p=>p.packed).length||0;
  const cd=trip.checklist?.filter(c=>c.done).length||0;
  const pr=trip.stops.filter(s=>s.train?.reservationRequired&&!s.train?.reservationBooked);
  const totalResCost=trip.stops.reduce((a,s)=>a+(parseFloat(s.train?.reservationCost)||0),0);
  const travellers=(trip.travellers||[]).filter(v=>v.name);

  const OV_TABS=['summary','itinerary','packing','checklist','documents'];

  const warn=pr.length?`<div class="warn" style="margin-bottom:20px">${IC.warn} <strong>${pr.length} reservation${pr.length!==1?'s':''} still needed:</strong> ${pr.map(s=>esc(s.city||'unnamed')).join(', ')}. Don't leave these too late!</div>`:'';

  let content='';
  switch(S.ovTab){
    case'summary':content=renderOvSummary(trip,totalNights,totalPlaces,doneP,pd,cd,travellers,totalResCost);break;
    case'itinerary':content=renderOvItinerary(trip);break;
    case'packing':content=renderOvPacking(trip,pd);break;
    case'checklist':content=renderOvChecklist(trip,cd);break;
    case'documents':content=renderOvDocuments(trip);break;
  }

  return`<div class="screen-wide fade">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:16px">
      <div>
        <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:8px;font-weight:700">Trip Overview</div>
        <h1 class="lora" style="font-size:clamp(26px,5vw,44px);line-height:1.05;font-weight:400">${esc(trip.name)}</h1>
        ${trip.startDate||trip.endDate?`<div style="font-size:13px;color:var(--ink3);margin-top:7px;font-weight:300">${trip.startDate||''}${trip.startDate&&trip.endDate?' to ':''}${trip.endDate||''}${trip.passType?` <span style="margin-left:14px">${IC.ticket} ${esc(trip.passType.split('-')[0].trim())}</span>`:''}</div>`:''}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-gh no-print" data-action="exportTrip" data-id="${trip.id}">${IC.note} Download backup</button>
        <button class="btn btn-gh no-print" data-action="printTrip">${IC.print} Print / PDF</button>
        <button class="btn btn-out no-print" data-action="goPlan">&#8592; Edit Trip</button>
      </div>
    </div>
    ${warn}
    <div class="kpi-strip">
      ${[
        {l:'Destinations',v:trip.stops.filter(s=>s.city).length,i:IC.pin},
        {l:'Nights',v:totalNights,i:IC.moon},
        {l:'Days',v:totalNights+1,i:IC.sun},
        {l:'Travellers',v:travellers.length||trip.travellers?.length||0,i:IC.people},
        {l:'Travel Days',v:trip.totalTravelDays||'n/a',i:IC.ticket},
        {l:'Res. Cost',v:totalResCost>0?`${trip.currency||'£'}${totalResCost}`:'n/a',i:IC.tag},
        {l:'Budget',v:trip.totalBudget||'n/a',i:IC.tag},
        {l:'Ready',v:`${cd}/${trip.checklist?.length||0}`,i:IC.checkc},
      ].map(s=>`<div class="kpi-box"><div style="margin-bottom:6px;line-height:1">${s.i}</div><div class="kpi-val">${esc(s.v)}</div><div class="kpi-lbl">${s.l}</div></div>`).join('')}
    </div>
    <div class="tab-row" style="margin-bottom:24px">
      ${OV_TABS.map(t=>`<button class="tab${S.ovTab===t?' on':''}" data-action="setOvTab" data-tab="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
    </div>
    ${content}
    <div style="margin-top:34px;text-align:right"><button class="btn btn-out" data-action="goPlan">&#8592; Back to Planning</button></div>
  </div>`;
}

function renderOvSummary(trip,totalNights,totalPlaces,doneP,pd,cd,travellers,totalResCost){
  const nightsData=trip.stops.filter(s=>s.city&&Number(s.nights)>0).map(s=>({name:s.city,value:Number(s.nights)}));
  const placeTypes={};
  trip.stops.forEach(s=>(s.places||[]).forEach(p=>{placeTypes[p.type]=(placeTypes[p.type]||0)+1;}));
  const placesData=Object.entries(placeTypes).map(([name,value])=>({name,value}));
  const budgetData=trip.stops.filter(s=>s.city&&(s.budgetPerDay||s.hotel?.cost)).map(s=>({
    city:s.city,
    stay:parseFloat((s.hotel?.cost||'0').replace(/[^0-9.]/g,''))||0,
    daily:(parseFloat((s.budgetPerDay||'0').replace(/[^0-9.]/g,''))||0)*Number(s.nights||0)
  })).filter(d=>d.stay>0||d.daily>0);

  const timelineData=trip.stops.filter(s=>s.city&&Number(s.nights)>0);
  const stopsComplete=trip.stops.filter(s=>s.city&&s.hotel?.name&&s.train?.number).length;
  const stopsTotal=trip.stops.length||1;
  const itinPct=Math.round((stopsComplete/stopsTotal)*100);
  const packPct=trip.packing?.length?Math.round((pd/trip.packing.length)*100):0;
  const checkPct=trip.checklist?.length?Math.round((cd/trip.checklist.length)*100):0;
  const overallPct=Math.round((itinPct+packPct+checkPct)/3);
  const totalBudgetNum=parseFloat((trip.totalBudget||'0').replace(/[^0-9.]/g,''))||0;
  const allocatedNum=budgetData.reduce((a,d)=>a+d.stay+d.daily,0);
  const remainingNum=totalBudgetNum>0?Math.max(0,totalBudgetNum-allocatedNum):0;
  const COLORS=['#BC0C0C','#d44','#e87','#c84','#8a4010','#2a6060','#1a4080','#5a2080'];

  window._chartData={nights:nightsData,places:placesData,budget:budgetData};

  // ── Trip timeline bar ──────────────────────────────────────────────────────
  const timelineBar=(()=>{
    if(timelineData.length<2)return'';
    const total=timelineData.reduce((a,s)=>a+(Number(s.nights)||0),0)||1;
    let x=0;
    const segments=timelineData.map((s,i)=>{
      const pct=(Number(s.nights)/total)*100;
      const seg=`<div style="height:100%;width:${pct.toFixed(2)}%;background:${COLORS[i%COLORS.length]};position:relative;min-width:2px" title="${esc(s.city)}: ${s.nights} nights">
        ${pct>8?`<span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;max-width:90%;text-overflow:ellipsis">${esc(s.city)}</span>`:''}
      </div>`;
      x+=pct;
      return seg;
    }).join('');
    const legend=timelineData.map((s,i)=>`
      <div style="display:flex;align-items:center;gap:5px">
        <div style="width:9px;height:9px;border-radius:2px;background:${COLORS[i%COLORS.length]};flex-shrink:0"></div>
        <span style="font-size:11px;color:var(--ink2)">${esc(s.city)} <span style="color:var(--ink3)">${s.nights}n</span></span>
      </div>`).join('');
    return`<div style="height:36px;display:flex;border-radius:3px;overflow:hidden;margin-bottom:10px">${segments}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px 16px">${legend}</div>`;
  })();

  // ── Readiness ring ─────────────────────────────────────────────────────────
  const col=overallPct>=80?'#1a6040':overallPct>=50?'#BC0C0C':'#c08000';
  const r=34,cx=40,cy=40,circ=2*Math.PI*r;
  const dash=circ*(overallPct/100);
  const readinessRing=`<svg viewBox="0 0 80 80" width="80" height="80" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e9e0d2" stroke-width="7"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="7"
      stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-dashoffset="${(circ/4).toFixed(1)}" stroke-linecap="round"/>
    <text x="${cx}" y="${cy-3}" text-anchor="middle" style="font-family:Lora,serif;font-size:15px;font-weight:700;fill:${col}">${overallPct}%</text>
    <text x="${cx}" y="${cy+10}" text-anchor="middle" style="font-family:Overpass,sans-serif;font-size:7px;fill:#8a7a68;letter-spacing:.5px;font-weight:700">READY</text>
  </svg>`;

  // ── Traveller pills ────────────────────────────────────────────────────────
  const travellerPills=travellers.length?`
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px">
      ${travellers.map(v=>`<div style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--cr3);padding:8px 14px;border-radius:3px">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:12px;font-weight:700;flex-shrink:0">${esc(v.name.charAt(0).toUpperCase())}</div>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--ink)">${esc(v.name)}</div>
          ${v.nationality||v.soloTraveller?`<div style="font-size:10px;color:var(--ink3)">${v.soloTraveller?'Solo · ':''}${esc(v.nationality||'')}</div>`:''}
        </div>
      </div>`).join('')}
    </div>`:'';

  return`
  <!-- ROW 1: Map full width -->
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
    <div style="padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--cr3)">
      <div class="sec" style="margin:0">Route Map</div>
      ${timelineData.length>0?`<div style="font-size:11px;color:var(--ink3)">${timelineData.length} ${timelineData.length===1?'stop':'stops'} · ${totalNights} nights</div>`:''}
    </div>
    <div style="padding:16px 20px 0">${renderMap(trip.stops)}</div>
    ${timelineBar?`<div style="padding:14px 20px 18px;border-top:1px solid var(--cr3);margin-top:14px">${timelineBar}</div>`:''}
  </div>

  <!-- ROW 2: Readiness + progress bars + stats -->
  <div style="display:grid;grid-template-columns:auto 1fr 1fr;gap:14px;margin-bottom:16px;align-items:stretch">
    <!-- Readiness ring -->
    <div class="card" style="padding:20px 22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-width:140px">
      <div class="sec" style="margin-bottom:12px">Readiness</div>
      ${readinessRing}
    </div>
    <!-- Progress bars -->
    <div class="card" style="padding:18px 22px">
      <div class="sec" style="margin-bottom:14px">Planning Progress</div>
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-size:12px;color:var(--ink2)">Itinerary</span>
          <span style="font-size:11px;font-weight:700;color:var(--ink2)">${stopsComplete}/${stopsTotal} stops</span>
        </div>
        <div class="pbar" style="height:6px"><div class="pfill" style="width:${itinPct}%;height:6px"></div></div>
      </div>
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-size:12px;color:var(--ink2)">Packing</span>
          <span style="font-size:11px;font-weight:700;color:var(--ink2)">${pd}/${trip.packing?.length||0} items</span>
        </div>
        <div class="pbar" style="height:6px"><div class="pfill" style="width:${packPct}%;height:6px"></div></div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-size:12px;color:var(--ink2)">Checklist</span>
          <span style="font-size:11px;font-weight:700;color:var(--ink2)">${cd}/${trip.checklist?.length||0} tasks</span>
        </div>
        <div class="pbar" style="height:6px"><div class="pfill" style="width:${checkPct}%;height:6px"></div></div>
      </div>
    </div>
    <!-- Budget summary -->
    <div class="card" style="padding:18px 22px">
      <div class="sec" style="margin-bottom:14px">Budget</div>
      ${totalBudgetNum>0?`
        <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:12px">
          <span class="lora" style="font-size:24px;color:var(--red)">${trip.currency||'£'}${allocatedNum.toFixed(0)}</span>
          <span style="font-size:11px;color:var(--ink3)">of ${trip.totalBudget} allocated</span>
        </div>
        <div class="pbar" style="height:8px;margin-bottom:8px"><div class="pfill" style="width:${Math.min(100,(allocatedNum/totalBudgetNum)*100)}%;height:8px"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px">
          <span style="color:var(--ink3)">Remaining</span>
          <span style="font-weight:700;color:${remainingNum===0?'#c08000':'#1a6040'}">${trip.currency||'£'}${remainingNum.toFixed(0)}</span>
        </div>`:`
        <div style="color:var(--ink3);font-size:12px;line-height:1.6">
          Set a total budget in the Pass &amp; Budget step to track spend here.
        </div>
        <button class="btn btn-out" style="font-size:11px;padding:7px 14px;margin-top:12px" data-action="setPlanTab" data-tab="pass">Set budget →</button>`}
    </div>
  </div>

  <!-- ROW 3: Charts side by side (compact) -->
  ${(nightsData.length>1||placesData.length>0||budgetData.length>0)?`
  <div style="display:grid;grid-template-columns:${[nightsData.length>1,placesData.length>0,budgetData.length>0].filter(Boolean).map(()=>'1fr').join(' ')};gap:14px;margin-bottom:16px">
    ${nightsData.length>1?`<div class="card" style="padding:16px 18px">
      <div class="sec" style="margin-bottom:10px">Nights per City</div>
      <canvas id="chart-nights" height="90"></canvas>
      <div style="display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:8px" id="legend-nights"></div>
    </div>`:''}
    ${placesData.length>0?`<div class="card" style="padding:16px 18px">
      <div class="sec" style="margin-bottom:10px">Plans by Type</div>
      <canvas id="chart-places" height="90"></canvas>
      <div style="display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:8px" id="legend-places"></div>
    </div>`:''}
    ${budgetData.length>0?`<div class="card" style="padding:16px 18px">
      <div class="sec" style="margin-bottom:10px">Budget per Stop</div>
      <canvas id="chart-budget" height="90"></canvas>
      <div style="display:flex;gap:10px;margin-top:8px">
        <div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;background:#BC0C0C;border-radius:2px"></div><span style="font-size:10px;color:var(--ink3)">Stay</span></div>
        <div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;background:#e87;border-radius:2px"></div><span style="font-size:10px;color:var(--ink3)">Daily</span></div>
      </div>
    </div>`:''}
  </div>`:''}

  <!-- ROW 4: Travellers -->
  ${travellerPills}`;
}

function renderOvItinerary(trip){
  const TE={see:IC.eye,eat:IC.fork,drink:IC.glass,music:IC.music,shop:IC.shopbg,other:'&#x2726;'};
  if(!trip.stops.length){
    return`<div class="card" style="padding:40px;text-align:center"><div style="color:var(--ink3);font-size:13px">No stops added yet.</div><button class="btn btn-red" style="margin-top:16px" data-action="goPlan">Go to Planner →</button></div>`;
  }
  return`<div style="display:grid;gap:14px">
    <div style="background:var(--cr2);border:1px solid var(--cr3);border-radius:3px;padding:12px 18px;font-size:12px;color:var(--ink3)">
      ${IC.info} Click <strong>Edit stop</strong> on any card to jump straight to that stop in the planner.
    </div>
    ${trip.stops.map((stop,idx)=>{
    const hasTrail=!stop.train?.number;
    const hasHotel=!stop.hotel?.name;
    const incomplete=hasTrail||hasHotel;
    return`<div class="card" style="overflow:hidden;${incomplete?'border-color:var(--cr3)':''}">
      <!-- Stop header -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;background:${idx===0?'var(--red)':'var(--cr2)'};border-bottom:1px solid var(--cr3)">
        <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
          <div class="lora" style="font-size:20px;line-height:1;color:${idx===0?'rgba(255,255,255,.4)':'var(--red)'};flex-shrink:0">${idx+1}</div>
          <div style="min-width:0">
            <div class="lora" style="font-size:17px;color:${idx===0?'white':'var(--ink)'};font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${esc(stop.city||'Unnamed stop')}${stop.country?`<span style="opacity:.6;font-size:14px">, ${esc(stop.country)}</span>`:''}
            </div>
            <div style="font-size:11px;color:${idx===0?'rgba(255,255,255,.65)':'var(--ink3)'};display:flex;gap:10px;margin-top:3px;flex-wrap:wrap;font-weight:300">
              ${stop.nights>0?`<span>${IC.moon} ${stop.nights} night${stop.nights!==1?'s':''}</span>`:''}
              ${stop.arrivalDate?`<span>${IC.cal} ${stop.arrivalDate}</span>`:''}
              ${stop.budgetPerDay?`<span>${IC.tag} ${esc(stop.budgetPerDay)}/day</span>`:''}
              ${incomplete?`<span style="color:${idx===0?'rgba(255,200,100,.9)':'#c08000'};font-weight:600">${IC.warn} Incomplete</span>`:'<span style="color:${idx===0?\'rgba(150,255,150,.9)\':\'#1a6040\'};font-weight:600">✓ Planned</span>'}
            </div>
          </div>
        </div>
        <button class="btn" style="background:${idx===0?'rgba(255,255,255,.2)':'#fff'};color:${idx===0?'#fff':'var(--red)'};border:1px solid ${idx===0?'rgba(255,255,255,.4)':'var(--red)'};padding:7px 14px;font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap"
          data-action="editStop" data-sid="${stop.id}">Edit stop →</button>
      </div>

      <!-- City guide link -->
      ${(()=>{const g=getCityGuide(stop.city,stop.country);return g?`<div style="padding:8px 18px;background:#f5f0ff;border-bottom:1px solid var(--cr3);display:flex;align-items:center;justify-content:space-between"><span style="font-size:11px;color:#4a2080;font-weight:300">Read our guide to ${esc(stop.city||stop.country)}</span><a href="${g.url}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:#4a2080;white-space:nowrap">${IC.book} ${esc(g.label)} →</a></div>`:'';})()}
      <!-- Three columns -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-bottom:${stop.notes?'1px solid var(--cr3)':'none'}">

        <!-- Transport -->
        <div style="padding:16px 18px;border-right:1px solid var(--cr3)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div class="sec" style="font-size:9px;margin:0">${IC.train} Transport</div>
            <button class="btn-x" style="font-size:10px;color:var(--red);font-weight:700" data-action="editStop" data-sid="${stop.id}" data-tab="train">+ Add</button>
          </div>
          ${stop.train?.number?`<div style="font-size:12px;color:var(--ink2);line-height:1.8">
            <div style="font-weight:700">${stop.train.isNightTrain?IC.moon+' ':IC.train+' '}${esc(stop.train.number)}</div>
            ${stop.train.from&&stop.train.to?`<div style="color:var(--ink3)">${esc(stop.train.from)} → ${esc(stop.train.to)}</div>`:''}
            ${stop.train.depTime?`<div style="color:var(--ink3)">Dep ${stop.train.depTime}${stop.train.arrTime?' · Arr '+stop.train.arrTime:''}</div>`:''}
            ${stop.train.bookingRef?`<div style="color:var(--ink3);font-size:11px">Ref: ${esc(stop.train.bookingRef)}</div>`:''}
            ${stop.train.reservationBooked?`<div style="color:#1a6040;font-weight:700;font-size:11px">✓ Res. confirmed</div>`:stop.train.reservationRequired?`<div style="color:#c08000;font-weight:700;font-size:11px">${IC.warn} Res. needed</div>`:''}
          </div>`:`<div style="font-size:12px;color:var(--ink4);font-style:italic">Not added yet</div>`}
          ${stop.flight?.number&&!stop.train?.number?`<div style="font-size:12px;color:var(--ink2);margin-top:6px">${IC.plane} ${esc(stop.flight.number)}</div>`:''}
        </div>

        <!-- Hotel -->
        <div style="padding:16px 18px;border-right:1px solid var(--cr3)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div class="sec" style="font-size:9px;margin:0">${IC.hotel} Hotel</div>
            <button class="btn-x" style="font-size:10px;color:var(--red);font-weight:700" data-action="editStop" data-sid="${stop.id}" data-tab="hotel">+ Add</button>
          </div>
          ${stop.hotel?.name?`<div style="font-size:12px;color:var(--ink2);line-height:1.8">
            <div style="font-weight:700">${esc(stop.hotel.name)}</div>
            ${stop.hotel.checkIn?`<div style="color:var(--ink3)">In: ${stop.hotel.checkIn}${stop.hotel.checkOut?' · Out: '+stop.hotel.checkOut:''}</div>`:''}
            ${stop.hotel.cost?`<div style="color:var(--ink3)">Cost: ${esc(stop.hotel.cost)}</div>`:''}
            ${stop.hotel.bookingRef?`<div style="color:var(--ink3);font-size:11px">Ref: ${esc(stop.hotel.bookingRef)}</div>`:''}
            ${stop.hotel.cancellationDeadline?`<div style="color:#c08000;font-size:11px">${IC.warn} Cancel by: ${stop.hotel.cancellationDeadline}</div>`:''}
            ${stop.hotel.link?`<a href="${esc(stop.hotel.link)}" target="_blank" rel="noopener" style="font-size:11px;display:block;margin-top:4px">View booking →</a>`:''}
          </div>`:`<div style="font-size:12px;color:var(--ink4);font-style:italic">Not added yet</div>`}
        </div>

        <!-- Places -->
        <div style="padding:16px 18px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div class="sec" style="font-size:9px;margin:0">${IC.pin} Places</div>
            <button class="btn-x" style="font-size:10px;color:var(--red);font-weight:700" data-action="editStop" data-sid="${stop.id}" data-tab="places">+ Add</button>
          </div>
          ${stop.places?.length?`<div>
            ${stop.places.slice(0,5).map(p=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
              <span style="flex-shrink:0">${TE[p.type]||'✦'}</span>
              <span style="font-size:12px;color:${p.done?'var(--ink4)':'var(--ink2)'};text-decoration:${p.done?'line-through':'none'};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span>
              ${p.link?`<a href="${esc(p.link)}" target="_blank" rel="noopener" style="font-size:10px;flex-shrink:0">↗</a>`:''}
            </div>`).join('')}
            ${stop.places.length>5?`<div style="font-size:11px;color:var(--ink3);margin-top:4px">+${stop.places.length-5} more</div>`:''}
            <div style="margin-top:6px">
              <div class="pbar"><div class="pfill" style="width:${stop.places.length?(stop.places.filter(p=>p.done).length/stop.places.length)*100:0}%"></div></div>
              <div style="font-size:10px;color:var(--ink3);margin-top:3px">${stop.places.filter(p=>p.done).length}/${stop.places.length} visited</div>
            </div>
          </div>`:`<div style="font-size:12px;color:var(--ink4);font-style:italic">Nothing added yet</div>`}
          ${stop.dayTrips?.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--cr3)">
            <div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px">Day Trips</div>
            ${stop.dayTrips.map(dt=>`<div style="font-size:11px;color:var(--ink2);margin-bottom:3px">${IC.map} ${esc(dt.destination)}</div>`).join('')}
          </div>`:''}
        </div>
      </div>

      ${stop.notes?`<div style="padding:10px 18px;background:var(--cr)"><span style="font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:1">NOTES </span><span style="font-size:12px;color:var(--ink2)">${esc(stop.notes)}</span></div>`:''}
    </div>`;
  }).join('')}
  </div>`;
}

function renderOvPacking(trip,pd){
  const total=trip.packing?.length||0;
  return`<div>
    <div style="margin-bottom:14px"><div class="sec" style="margin:0 0 3px">Packing List</div><div style="font-size:12px;color:var(--ink3)">${pd} of ${total} packed</div></div>
    <div class="pbar" style="margin-bottom:20px"><div class="pfill" style="width:${total?(pd/total)*100:0}%"></div></div>
    ${PACK_CATS.map(cat=>{
      const items=(trip.packing||[]).filter(p=>p.cat===cat);
      if(!items.length)return'';
      return`<div class="card" style="margin-bottom:12px;overflow:hidden">
        <div style="padding:10px 16px;background:var(--cr2);border-bottom:1px solid var(--cr3);display:flex;justify-content:space-between">
          <span style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink2)">${cat}</span>
          <span style="font-size:11px;color:var(--ink3)">${items.filter(p=>p.packed).length}/${items.length}</span>
        </div>
        ${items.map(item=>`<div class="chk-row"><span style="font-size:14px;color:var(--red)">${item.packed?IC.check:'&#9633;'}</span><span style="font-size:13px;color:${item.packed?'var(--ink3)':'var(--ink)'};text-decoration:${item.packed?'line-through':'none'}">${esc(item.name)}</span></div>`).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function renderOvChecklist(trip,cd){
  const total=trip.checklist?.length||0;
  return`<div>
    <div style="margin-bottom:14px"><div class="sec" style="margin:0 0 3px">Pre-Trip Checklist</div><div style="font-size:12px;color:var(--ink3)">${cd} of ${total} tasks complete</div></div>
    <div class="pbar" style="margin-bottom:20px"><div class="pfill" style="width:${total?(cd/total)*100:0}%"></div></div>
    ${CHECK_CATS.map(cat=>{
      const items=(trip.checklist||[]).filter(c=>c.cat===cat);
      if(!items.length)return'';
      return`<div class="card" style="margin-bottom:12px;overflow:hidden">
        <div style="padding:10px 16px;background:var(--cr2);border-bottom:1px solid var(--cr3);display:flex;justify-content:space-between">
          <span style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink2)">${cat}</span>
          <span style="font-size:11px;color:var(--ink3)">${items.filter(c=>c.done).length}/${items.length}</span>
        </div>
        ${items.map(item=>`<div class="chk-row"><span style="font-size:14px;color:var(--red)">${item.done?IC.check:'&#9633;'}</span><span style="font-size:13px;color:${item.done?'var(--ink3)':'var(--ink)'};text-decoration:${item.done?'line-through':'none'}">${esc(item.label)}</span></div>`).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function renderOvDocuments(trip){
  if(!trip.documents?.length)return`<div class="card" style="padding:40px;text-align:center"><div style="font-size:13px;color:var(--ink3)">No documents added.</div></div>`;
  return`<div>
    <div class="sec" style="margin-bottom:14px">Documents &amp; Links</div>
    <div style="display:grid;gap:11px">
      ${(trip.documents||[]).map(d=>`<div class="card" style="padding:16px 20px;display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap">
        <div style="flex:1;min-width:140px">
          <div class="lora" style="font-size:16px;margin-bottom:5px;font-weight:400">${esc(d.name||'Untitled')}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <span class="badge">${esc(d.category)}</span>
            ${d.ref?`<span style="font-size:11px;color:var(--ink3)">Ref: ${esc(d.ref)}</span>`:''}
            ${d.expiry?`<span style="font-size:11px;color:#c08000">Expires: ${esc(d.expiry)}</span>`:''}
          </div>
          ${d.notes?`<div style="font-size:12px;color:var(--ink3);margin-top:5px">${esc(d.notes)}</div>`:''}
        </div>
        ${d.link?`<a href="${esc(d.link.startsWith('http')?d.link:'https://'+d.link)}" target="_blank" rel="noopener" style="font-size:13px;font-weight:700;flex-shrink:0;align-self:center">Open →</a>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

function render(){
  destroyCharts();

  // Print view takes over overview
  if(S.showPrintView&&getTrip()){
    document.getElementById('app').innerHTML=renderNav()+renderPrintView(getTrip())+renderFooter();
    return;
  }

  let content='';
  switch(S.screen){
    case'home':content=renderHome();break;
    case'plan':content=renderPlan();break;
    case'overview':content=renderOverview();break;
    case'resources':content=renderResources();break;
  }
  // Overlays injected at top level
  const overlays=renderOnboarding()+renderEmailModal();
  document.getElementById('app').innerHTML=renderNav()+content+renderFooter()+overlays;
  postRender();
}

function destroyCharts(){
  Object.values(S.chartInst).forEach(c=>{try{c.destroy();}catch(e){}});
  S.chartInst={};
}

function postRender(){
  if(S.screen!=='overview'||S.ovTab!=='summary')return;
  const d=window._chartData||{};
  const FONT={family:'Overpass',size:10};
  const TICK_COLOR='#8a7a68';
  const GRID_COLOR='rgba(0,0,0,.05)';

  if(d.nights&&d.nights.length>1){
    const el=document.getElementById('chart-nights');
    const leg=document.getElementById('legend-nights');
    if(el){
      S.chartInst.nights=new Chart(el,{
        type:'doughnut',
        data:{labels:d.nights.map(x=>x.name),datasets:[{data:d.nights.map(x=>x.value),backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]},
        options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw}n`}}},cutout:'62%',animation:{duration:400}}
      });
    }
    if(leg){leg.innerHTML=d.nights.map((x,i)=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:50%;background:${CHART_COLORS[i%CHART_COLORS.length]};flex-shrink:0"></div><span style="font-size:10px;color:var(--ink2)">${esc(x.name)} (${x.value}n)</span></div>`).join('');}
  }

  if(d.places&&d.places.length>0){
    const el=document.getElementById('chart-places');
    const leg=document.getElementById('legend-places');
    if(el){
      S.chartInst.places=new Chart(el,{
        type:'doughnut',
        data:{labels:d.places.map(x=>TYPE_LABEL[x.name]||x.name),datasets:[{data:d.places.map(x=>x.value),backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]},
        options:{plugins:{legend:{display:false}},cutout:'62%',animation:{duration:400}}
      });
    }
    if(leg){leg.innerHTML=d.places.map((x,i)=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:50%;background:${CHART_COLORS[i%CHART_COLORS.length]};flex-shrink:0"></div><span style="font-size:10px;color:var(--ink2)">${TYPE_LABEL[x.name]||x.name} (${x.value})</span></div>`).join('');}
  }

  if(d.budget&&d.budget.length>0){
    const el=document.getElementById('chart-budget');
    if(el){
      S.chartInst.budget=new Chart(el,{
        type:'bar',
        data:{labels:d.budget.map(x=>x.city),datasets:[
          {label:'Stay',data:d.budget.map(x=>x.stay),backgroundColor:'#BC0C0C',borderRadius:2,stack:'a'},
          {label:'Daily',data:d.budget.map(x=>x.daily),backgroundColor:'#e8976a',borderRadius:2,stack:'a'}
        ]},
        options:{
          plugins:{legend:{display:false}},
          scales:{
            x:{ticks:{font:FONT,color:TICK_COLOR,maxRotation:30},grid:{color:GRID_COLOR}},
            y:{ticks:{font:FONT,color:TICK_COLOR},grid:{color:GRID_COLOR}}
          },
          animation:{duration:400}
        }
      });
    }
  }
}

window.travField=function(tid,key,val){
  const t=getTrip();if(!t)return;
  const tr=t.travellers.find(v=>v.id==tid);
  if(tr){tr[key]=val;persist();}
};
window.travSolo=function(tid,val){
  const t=getTrip();if(!t)return;
  const tr=t.travellers.find(v=>v.id==tid);
  if(tr){tr.soloTraveller=val;persist();render();}
};
window.packToggle=function(iid){
  const t=getTrip();if(!t)return;
  const item=t.packing.find(p=>p.id==iid);
  if(item){item.packed=!item.packed;persist();render();}
};
window.packField=function(iid,key,val){
  const t=getTrip();if(!t)return;
  const item=t.packing.find(p=>p.id==iid);
  if(item){item[key]=val;persist();}
};
window.checkToggle=function(iid){
  const t=getTrip();if(!t)return;
  const item=t.checklist.find(c=>c.id==iid);
  if(item){item.done=!item.done;persist();render();}
};
window.checkField=function(iid,key,val){
  const t=getTrip();if(!t)return;
  const item=t.checklist.find(c=>c.id==iid);
  if(item){item[key]=val;persist();}
};
window.docField=function(did,key,val){
  const t=getTrip();if(!t)return;
  const doc=t.documents.find(d=>d.id==did);
  if(doc){doc[key]=val;persist();}
};
window.placeField=function(sid,pid,key,val){
  const s=getStop(sid);if(!s)return;
  const p=s.places.find(x=>x.id==pid);
  if(p){p[key]=val;persist();if(key==='done')render();}
};
window.dtField=function(sid,dtid,key,val){
  const s=getStop(sid);if(!s)return;
  const dt=s.dayTrips.find(x=>x.id==dtid);
  if(dt){dt[key]=val;persist();if(key==='usesTravelDay')render();}
};

// EVENT DELEGATION
// =====================================================================
document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]');
  if(!el)return;
  e.stopPropagation();
  const action=el.dataset.action;

  switch(action){
    case'goHome':S.screen='home';S.showPrintView=false;render();break;
    case'goPlan':if(getTrip()){S.screen='plan';S.showPrintView=false;render();}break;
    case'goOverview':if(getTrip()?.saved){S.screen='overview';S.showPrintView=false;render();}break;
    case'goResources':S.screen='resources';S.showPrintView=false;render();break;

    // Onboarding
    case'onboardNext':{
      if(S.onboardStep<ONBOARD_STEPS.length-1){
        S.onboardStep++;render();
      }else{
        S.showOnboarding=false;
        try{localStorage.setItem('tgc_onboarded','1');}catch(e){}
        render();
      }break;
    }

    // Email capture
    case'submitEmail':{
      const inp=document.getElementById('email-input');
      const email=inp?inp.value.trim():'';
      if(email&&email.includes('@')){
        // In production: POST to ConvertKit/Mailchimp API here
        // For now, store locally and show confirmation
        try{localStorage.setItem('tgc_email_captured',email);}catch(e){}
        S.emailSubmitted=true;
        S.showEmailModal=false;
        // Show brief success then go to overview
        render();
        setTimeout(()=>{S.screen='overview';render();},400);
      }else{
        const inp2=document.getElementById('email-input');
        if(inp2){inp2.style.borderColor='var(--red)';inp2.focus();}
      }break;
    }
    case'skipEmail':{
      S.showEmailModal=false;
      try{localStorage.setItem('tgc_email_captured','skipped');}catch(e){}
      S.screen='overview';render();break;
    }

    // Print
    case'printTrip':{S.showPrintView=true;render();break;}
    case'closePrint':{S.showPrintView=false;render();break;}

    // Export / Import
    case'exportAll':  {exportTrips();break;}
    case'exportTrip': {exportOneTrip(el.dataset.id);break;}
    case'importTrips':{importTrips();break;}

    // Edit a specific stop from overview — jump to planner, expand that stop, optionally switch its sub-tab
    case'editStop':{
      const sid=el.dataset.sid;
      const tab=el.dataset.tab||'overview';
      const t=getTrip();
      if(!t)break;
      // Collapse all stops, expand only this one
      t.stops.forEach(s=>{s.expanded=(s.id==sid);if(s.id==sid)s.activeTab=tab;});
      // Switch to itinerary plan tab
      t.planTab='itinerary';
      S.screen='plan';
      S.showPrintView=false;
      persist();
      render();
      // Scroll to the stop card after render
      setTimeout(()=>{
        const el2=document.querySelector(`[data-sid="${sid}"]`);
        if(el2)el2.scrollIntoView({behavior:'smooth',block:'start'});
      },150);
      break;
    }

    case'createTrip':{
      const t=blankTrip();S.trips.push(t);S.activeId=t.id;S.screen='plan';persist();render();break;
    }
    case'openTrip':{
      S.activeId=Number(el.dataset.id)||el.dataset.id;
      S.screen=el.dataset.view||'plan';
      persist();render();break;
    }
    case'deleteTrip':{
      const id=Number(el.dataset.id)||el.dataset.id;
      if(confirm('Delete this trip? This cannot be undone.')){
        S.trips=S.trips.filter(t=>t.id!=id);
        if(S.activeId==id){S.activeId=null;S.screen='home';}
        persist();render();
      }break;
    }
    case'deleteCurrent':{
      if(confirm('Delete this trip?')){
        S.trips=S.trips.filter(t=>t.id!=S.activeId);
        S.activeId=null;S.screen='home';persist();render();
      }break;
    }
    case'saveOverview':{
      const t=getTrip();if(t){t.saved=true;persist();}
      // Show email capture on first save unless already done
      if(!S.emailSubmitted){
        S.showEmailModal=true;
        S.screen='overview'; // pre-set so skip goes there
        render();
      }else{
        S.screen='overview';render();
      }break;
    }
    case'setPlanTab':{
      const t=getTrip();if(t){t.planTab=el.dataset.tab;persist();render();}break;
    }
    case'setOvTab':{
      S.ovTab=el.dataset.tab;render();break;
    }

    // Travellers
    case'addTraveller':{
      const t=getTrip();if(t){t.travellers.push(blankTraveller());persist();render();}break;
    }
    case'delTraveller':{
      const t=getTrip();if(t){t.travellers=t.travellers.filter(v=>v.id!=el.dataset.tid);persist();render();}break;
    }

    // Stops
    case'addStop':{
      const t=getTrip();if(t){t.stops.forEach(s=>s.expanded=false);t.stops.push(blankStop());persist();render();}break;
    }
    case'delStop':{
      const t=getTrip();if(t&&confirm('Remove this stop?')){t.stops=t.stops.filter(s=>s.id!=el.dataset.sid);persist();render();}break;
    }
    case'toggleStop':{
      const s=getStop(el.dataset.sid);if(s){s.expanded=!s.expanded;persist();render();}break;
    }
    case'moveStop':{
      const t=getTrip();if(!t)break;
      const sid=el.dataset.sid,dir=Number(el.dataset.dir);
      const i=t.stops.findIndex(s=>s.id==sid),j=i+dir;
      if(j>=0&&j<t.stops.length){[t.stops[i],t.stops[j]]=[t.stops[j],t.stops[i]];persist();render();}break;
    }
    case'setStopTab':{
      const s=getStop(el.dataset.sid);if(s){s.activeTab=el.dataset.tab;persist();render();}break;
    }

    // Places
    case'addPlace':{
      const s=getStop(el.dataset.sid);if(s){s.places.push({id:uid(),name:'',type:'see',link:'',notes:'',done:false});persist();render();}break;
    }
    case'delPlace':{
      const s=getStop(el.dataset.sid);if(s){s.places=s.places.filter(p=>p.id!=el.dataset.pid);persist();render();}break;
    }

    // Day Trips
    case'addDayTrip':{
      const s=getStop(el.dataset.sid);if(s){if(!s.dayTrips)s.dayTrips=[];s.dayTrips.push({id:uid(),destination:'',date:'',usesTravelDay:false,trainInfo:'',notes:''});persist();render();}break;
    }
    case'delDayTrip':{
      const s=getStop(el.dataset.sid);if(s){s.dayTrips=s.dayTrips.filter(d=>d.id!=el.dataset.dtid);persist();render();}break;
    }

    // Packing
    case'addPackItem':{
      const t=getTrip();if(t){t.packing.push({id:uid(),name:'',cat:'Other',packed:false});persist();render();}break;
    }
    case'delPackItem':{
      const t=getTrip();if(t){t.packing=t.packing.filter(p=>p.id!=el.dataset.iid);persist();render();}break;
    }

    // Checklist
    case'addCheckItem':{
      const t=getTrip();if(t){t.checklist.push({id:uid(),label:'',cat:'Booking',done:false});persist();render();}break;
    }
    case'delCheckItem':{
      const t=getTrip();if(t){t.checklist=t.checklist.filter(c=>c.id!=el.dataset.iid);persist();render();}break;
    }

    // Documents
    case'addDoc':{
      const t=getTrip();if(t){if(!t.documents)t.documents=[];t.documents.push(blankDoc());persist();render();}break;
    }
    case'delDoc':{
      const t=getTrip();if(t){t.documents=t.documents.filter(d=>d.id!=el.dataset.did);persist();render();}break;
    }
  }
});

// Hover effects on trip cards
document.addEventListener('mouseover',function(e){
  const card=e.target.closest('.card[data-action="openTrip"]');
  if(card){card.style.borderColor='var(--red)';card.style.boxShadow='0 3px 16px var(--red-g)';}
});
document.addEventListener('mouseout',function(e){
  const card=e.target.closest('.card[data-action="openTrip"]');
  if(card){card.style.borderColor='var(--cr3)';card.style.boxShadow='none';}
});

// =====================================================================
// INIT
// =====================================================================
load();
render();
</script>
</body>
</html>
